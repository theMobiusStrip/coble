name: publish

on:
  release:
    types: [published]
  workflow_dispatch: {}   # allow manual re-run from the Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write        # OIDC + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org   # required so npm targets the OIDC registry
      - run: npm install -g npm@latest   # OIDC trusted publishing needs npm >= 11.5.1
      - run: node -v && npm -v           # diagnostic: confirm npm >= 11.5.1 at publish time
      - run: npm ci
      - run: npm publish                 # prepublishOnly runs the gate
