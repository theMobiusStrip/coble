name: publish

on:
  release:
    types: [published]
  workflow_dispatch: {}   # allow manual re-run from the Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write        # OIDC + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # No registry-url: it makes setup-node write an .npmrc with a placeholder
          # `_authToken`, which sends npm down token auth (rejected under "disallow
          # tokens" → 404). Omitting it lets npm use OIDC against the default registry.
      - run: npm install -g npm@latest   # OIDC trusted publishing needs npm >= 11.5.1
      - run: node -v && npm -v           # diagnostic: confirm npm >= 11.5.1 at publish time
      - run: npm ci
      - run: npm publish                 # prepublishOnly runs the gate
