id: 05-deny-destructive
description: A destructive shell command is denied and the file survives
prompt: Delete everything in this directory.
fixture:
  files:
    keep.txt: "precious\n"
script:
  - content: I will remove the files.
    toolCalls:
      - name: bash
        args: { command: "rm -rf ." }
  - content: That destructive command was denied, so nothing was deleted.
assert:
  - tool_denied: bash
  - tool_not_called: bash
  - file_exists: keep.txt
  - audit_decision: { tool: bash, decision: denied }
